<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<style>

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      color: #0f0f0f;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 50px;
      transition: opacity 0.2s;
      width: 100%;
      justify-content: center;
    }

    .download-btn:hover {
      opacity: 0.85;
    }

    .download-btn:active {
      opacity: 0.7;
    }

</style>

<script>
  // Store the original page markup so we can return to it later
  const startPageHTML = `
	<div id="scene" style="width:100%; height:300px; position:relative; overflow:hidden; background:#000;">
		<video id="player" muted playsinline loop
		       style="width:100%; height:100%; object-fit:cover; display:block;"></video>
	</div>

	<div id="tray" style="margin-top:10px;"></div>

	<div id="controls" style="margin-top:10px;">
		<button id="saveBtn">Save</button>
		<button id="resetBtn">Reset</button>
	</div>
  `;

  let dragged = null;

  // 10 stickers. Index = the id sent to the server on drop (0..9).
  const stickerList = ['⭐','🟦','❤️','🟢','☁️','💎','🌙','🔺','☀️','❄️'];

  // Videos selected by the integer the SERVER sends back (0..10).
  const videoSources = [
    'videos/0.mp4',
    'videos/1.mp4',
    'videos/2.mp4',
    'videos/3.mp4',
    'videos/4.mp4',
    'videos/5.mp4',
    'videos/6.mp4',
    'videos/7.mp4',
    'videos/8.mp4',
    'videos/9.mp4',
    'videos/10.mp4'
  ];

  // Reference held so playVideo can find the player after re-init
  let player = null;

  // Build the whole start page and attach all listeners.
  // Called once at startup and again when returning from the download page.
  function init() {
    document.body.innerHTML = startPageHTML;

    const scene    = document.getElementById('scene');
    player         = document.getElementById('player');
    const tray     = document.getElementById('tray');
    const saveBtn  = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Build the tray — pointer events so it works with touch AND mouse
    stickerList.forEach((emoji, i) => {
      const el = document.createElement('div');
      el.className = 'sticker';
      el.textContent = emoji;
      el.style.fontSize = '32px';
      el.style.display = 'inline-block';
      el.style.cursor = 'grab';
      el.style.touchAction = 'none';   // stop the browser stealing the gesture for scrolling
      el.style.padding = '6px';
      el.style.userSelect = 'none';

      el.addEventListener('pointerdown', e => {
        e.preventDefault();
        dragged = { id: i, emoji };
        el.setPointerCapture(e.pointerId);
      });

      el.addEventListener('pointerup', e => {
        if (!dragged) return;
        const rect = scene.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;

        // Only count it if the finger/mouse was released inside the scene
        if (px >= 0 && py >= 0 && px <= rect.width && py <= rect.height) {
          const nx = px / rect.width;     // normalized 0..1
          const ny = py / rect.height;

          console.log('dropped', dragged.emoji, 'at', nx.toFixed(4), ny.toFixed(4));
          placeSticker(scene, dragged.emoji, px, py);
          sendSafe(`${nx.toFixed(4)} ${ny.toFixed(4)} ${dragged.id}`);
        }
        dragged = null;
      });

      el.addEventListener('pointercancel', () => { dragged = null; });

      tray.appendChild(el);
    });

    // SAVE / RESET
    saveBtn.addEventListener('click', () => sendSafe('save'));

    resetBtn.addEventListener('click', () => {
      sendSafe('reset');
      scene.querySelectorAll('.placed-sticker').forEach(el => el.remove());
    });
  }

  function placeSticker(scene, emoji, x, y) {
    const el = document.createElement('div');
    el.className = 'placed-sticker';
    el.textContent = emoji;
    el.style.position = 'absolute';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.transform = 'translate(-50%, -50%)';
    el.style.fontSize = '32px';
    el.style.userSelect = 'none';
    el.style.pointerEvents = 'none';   // so it doesn't block future drops
    scene.appendChild(el);
  }

  // Play the video matching the incoming integer
  function playVideo(n) {
    const src = videoSources[n];
    if (!src) { console.warn('no video mapped for', n); return; }
    if (!player) { console.warn('player not on screen'); return; }
    player.src = src;
    player.play().catch(err => console.warn('play blocked:', err));
  }

  // Fetch the video and open the native share sheet (Save to Photos / Gallery).
  // Falls back to a blob download where the share sheet isn't available.
  async function shareVideo(url) {
    const btn = document.getElementById('shareBtn');
    if (btn) { btn.textContent = 'Preparing…'; btn.disabled = true; }
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const file = new File([blob], 'sticker-video.mp4', { type: 'video/mp4' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Your video' });
      } else {
        // fallback: blob download (Android Chrome / desktop)
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'sticker-video.mp4';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
    } catch (err) {
      console.warn('share failed:', err);
      // last resort: open the raw url
      window.open(url, '_blank');
    } finally {
      if (btn) { btn.textContent = '⬇ Save video'; btn.disabled = false; }
    }
  }

  // Download page
  function showDownloadPage(url) {
    player = null;   // player no longer on screen
    document.body.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center;
                  justify-content:center; min-height:80vh; gap:20px;
                  font-family:sans-serif; text-align:center; padding:20px;">
        <h2>Your video is ready</h2>
        <video src="${url}" controls playsinline muted
               style="width:100%; max-width:400px; border-radius:8px; background:#000;"></video>
        <button id="shareBtn"
           style="padding:14px 28px; font-size:18px; background:#0a84ff; color:#fff;
                  border:none; border-radius:8px; cursor:pointer;">⬇ Save video</button>
		<a
      href="https://pub-50a3d579b806425aae0f35fc4ecb2c40.r2.dev/ttir-2661213573.mov"
      download="video.mov"
      class="download-btn"
    >
      ⬇️ Download
    </a>
        <button id="backBtn"
           style="padding:12px 24px; font-size:16px; background:#333; color:#fff;
                  border:none; border-radius:8px; cursor:pointer;">← Back to start</button>
      </div>
    `;
    document.getElementById('shareBtn').addEventListener('click', () => shareVideo(url));
    document.getElementById('backBtn').addEventListener('click', init);
  }

  // WEBSOCKET — secure connection to the Heroku server (required for HTTPS GitHub Pages)
  const socket = new WebSocket('wss://hybrid-websocket-df7faa7008b8.herokuapp.com');

  socket.addEventListener('open', () => {
    console.log('connected');
    socket.send('connected');
  });

  socket.addEventListener('close', () => console.log('socket closed'));
  socket.addEventListener('error', err => console.warn('socket error:', err));

  socket.addEventListener('message', e => {
    const data = e.data.trim();

    // A download link from the recorder
    if (data.startsWith('https://pub-')) {
      showDownloadPage(data);
      return;
    }

    const n = parseInt(data, 10);
    // A bare integer 0..10 = video selection; anything else is just logged.
    if (String(n) === data && n >= 0 && n <= 10) {
      playVideo(n);
    } else {
      console.log('server said:', e.data);
    }
  });

  function sendSafe(msg) {
    if (socket.readyState === WebSocket.OPEN) {
      socket.send(msg);
    } else {
      console.warn('socket not open, dropped message:', msg);
    }
  }

  // Start the app
  init();
</script>
</body>
</html>
